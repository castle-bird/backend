spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: false # H2는 스키마 검증만 수행
    placeholderReplacement: false # H2는 SQL 스크립트에서 ${} 구문을 변수로 인식하므로 비활성화

  jpa:
    hibernate:
      ddl-auto: validate

  data:
    redis:
      # host / port / username / password는 @DynamicPropertySource로 Testcontainers가 주입
      host: localhost
      port: 6379
      username: ""
      password: ""
      lettuce:
        pool:
          max-active: 2
          max-idle: 2
          min-idle: 0
          max-wait: 1000ms

