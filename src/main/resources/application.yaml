spring:
  application:
    name: backend

  datasource:
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  servlet:
    multipart:
      max-file-size: 10MB   # 단일 파일 최대 크기
      max-request-size: 30MB  # 전체 요청 최대 크기

  data:
    redis:
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 8    # 최대 활성 커넥션 수
          max-idle: 4      # 최대 유휴 커넥션 수
          min-idle: 2      # 최소 유휴 커넥션 수
          max-wait: 2000ms # 커넥션 대기 시간

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false  # 트랜잭션 범위 밖 LAZY 로딩 방지
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20  # 쓰기 최적화: 20개씩 묶어서 전송 (?reWriteBatchedInserts=true 연동)
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 100  # 조회 최적화: N+1 문제 방지

  Jackson:
    default-property-inclusion: non_null  # null 필드 응답 제외
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false  # 날짜를 ISO 문자열로 출력
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false  # 알 수 없는 필드 무시
    generator:
      escape-non-ascii: false  # 한글 이스케이프 방지

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# 커스텀
app:

  # Redis 캐시 TTL 설정 (초 단위)
  redis:
    default-ttl: 600s
    caches:
      employeeCache: 1800s
      reservationCache: 1800s

  jwt:
    secret-key: ${JWT_SECRET_KEY}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION_MS}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION_MS}
    jwt-issuer: ${JWT_ISSUER}

  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
    name: ${ADMIN_NAME}