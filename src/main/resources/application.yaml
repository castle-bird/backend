spring:
  application:
    name: backend

  # 파일 업로드 용량 제한
  servlet:
    multipart:
      max-file-size: 10MB     # 업로드 가능한 단일 파일 최대 크기
      max-request-size: 30MB  # 전체 요청 최대 크기 (여러 파일 업로드 시)

  # JPA 설정
  jpa:
    open-in-view: false                 # 트랜잭션 범위 밖에서 LAZY 로딩 방지
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true          # SQL 로그에 주석 추가
        default_batch_fetch_size: 100   # N+1 문제 방지 위해 100개씩 묶어서 쿼리 - 조회 최적화

  # Flyway 설정
  flyway:
    enabled: true               # Flyway 마이그레이션 활성화
    locations:
      - classpath:db/migration  # 스키마 저장 위치 - 관례


  # Jackson 설정
  jackson:
    default-property-inclusion: non_null  # API 응답에서 Null 값은 제외해서 보냄 - 데이터 절약
    date-format: yyyy-MM-dd HH:mm:ss      # 서버에서 시간 응답 포맷팅
    time-zone: Asia/Seoul                 # 서버 시간대 설정
    serialization:
      write-dates-as-timestamps: false    # Default: true. → Unix Timestamp로 출력 됨. - 날짜를 사람이 읽을 수 있는 형식으로 출력
      fail-on-empty-beans: false          # 빈 객체 에러 방지 - 빈 객체는 {}로 응답
    deserialization:
      fail-on-unknown-properties: false   # 알 수 없는 필드 무시 - API 유연성 향상
    generator:
      escape-non-ascii: false             # 한글 이스케이프 방지 - JSON 응답에서 한글이 그대로 보이도록

# Swagger 설정
springdoc:
  swagger-ui:
    path: /swagger-ui.html  # Swagger UI 경로
  api-docs:
    path: /v3/api-docs      # OpenAPI 명세 경로

# JWT 환경 변수 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION_MS}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION_MS}